name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write


jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          python3 -c "import os, base64; open('KeyGeo.jks', 'wb').write(base64.b64decode(os.environ['KEYSTORE_FILE_BASE64']))"

      - name: Build with Gradle
        env:
          KEYSTORE_FILE_PATH: "../KeyGeo.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease


      - name: Get Version Name
        id: get_version
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk || mv app/build/outputs/apk/release/app-release.apk GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk
          name: "GeoGas ${{ github.ref_name }}"
          body: |
            ## 🚀 Novedades v1.0.2 — Soporte Multi-idioma

            - **🌐 Soporte Multi-idioma (ES/EN)**: Selector de idioma integrado con persistencia — la app recuerda tu preferencia.
            - **🎨 Diálogo de idioma con estilo**: Panel personalizado que sigue la estética de la app (glassmorphism + gradiente).
            - **🔄 Cambio sin reinicio**: Al cambiar de idioma, la interfaz se actualiza instantáneamente sin recargar datos.
            - **📝 Traducción completa**: Todos los textos de la UI, filtros, detalles, mensajes de estado y hints traducidos.
            - **♻️ Arquitectura limpia**: `LocaleManager` con SharedPreferences, siguiendo principios Clean Code y SRP.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
