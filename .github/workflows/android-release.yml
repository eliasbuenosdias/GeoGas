name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign APK (Optional - using debug key if no secrets)
        # Note: For production you should use your signing key secrets
        # But here we'll assume assembleRelease worked or we use the unsigned
        run: echo "APK built"

      - name: Get Version Name
        id: get_version
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk || mv app/build/outputs/apk/release/app-release.apk GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: GeoGas-${{ steps.get_version.outputs.VERSION_NAME }}.apk
          name: "GeoGas ${{ github.ref_name }}"
          body: |
            ## 🚀 Novedades de esta versión
            - **✨ Soporte automático para Modo Oscuro**: Ahora la aplicación se adapta automáticamente a la configuración de tu sistema móvil.
            - **🎨 Colores Semánticos**: Mejoras en la legibilidad y contraste en interfaces oscuras.
            - **⚙️ Correcciones menores**: Ajustes visuales en paneles y filtros para una mejor experiencia de usuario.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
